<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دعوة فرح أحمد & دينا</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      overflow-x: hidden;
    }

    .container {
      padding: 30px;
      animation: fadeIn 2s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h1 {
      font-size: 34px;
      margin-top: 20px;
    }

    .names {
      font-size: 40px;
      color: #ffd700;
      margin: 20px 0;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 20px;
      margin-top: 20px;
      backdrop-filter: blur(10px);
    }

    p {
      font-size: 18px;
      margin: 8px 0;
    }

    .countdown {
      font-size: 22px;
      margin-top: 15px;
      color: #00ffcc;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #ffd700;
      color: black;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #fff;
      transform: scale(1.05);
    }

    .heart {
      font-size: 30px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {transform: scale(1);}
      50% {transform: scale(1.2);}
      100% {transform: scale(1);}
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>🎉 دعوة فرح 🎉</h1>

    <div class="names">أحمد ❤️ دينا</div>

    <div class="card">
      <p>نتشرف بدعوتكم لحضور حفل زفافنا</p>
      <p>📅 يوم 10 يوليو 2026</p>
      <p>📍 قاعة الأفراح - الإسكندرية</p>

      <div class="countdown" id="countdown"></div>

      <a class="btn" href="https://maps.google.com" target="_blank">📍 عرض المكان</a>
    </div>

    <div class="heart">💖</div>
  </div>

  <!-- موسيقى (اختياري) -->
  <audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
  </audio>

  <script>
    const weddingDate = new Date("July 10, 2026 20:00:00").getTime();

    const countdown = document.getElementById("countdown");

    setInterval(() => {
      const now = new Date().getTime();
      const diff = weddingDate - now;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);

      countdown.innerHTML = ⏳ باقي ${days} يوم و ${hours} ساعة و ${minutes} دقيقة;
    }, 1000);
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دعوة خطوبة أحمد & دينا</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      color: white;
      text-align: center;
    }

    .container {
      padding: 30px;
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h1 {
      font-size: 30px;
    }

    .names {
      font-size: 42px;
      color: #ffd700;
      margin: 20px 0;
    }

    .card {
      background: rgba(255,255,255,0.15);
      padding: 25px;
      border-radius: 25px;
      margin-top: 20px;
      backdrop-filter: blur(15px);
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .date {
      font-size: 20px;
      margin: 15px 0;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .box {
      background: rgba(0,0,0,0.4);
      padding: 15px;
      border-radius: 15px;
      width: 70px;
    }

    .num {
      font-size: 22px;
      font-weight: bold;
      color: #00ffcc;
    }

    .label {
      font-size: 14px;
    }

    .heart {
      font-size: 28px;
      margin-top: 20px;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0% {transform: scale(1);}
      50% {transform: scale(1.3);}
      100% {transform: scale(1);}
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>💍 دعوة خطوبة 💍</h1>

    <div class="names">أحمد ❤️ دينا</div>

    <div class="card">
      <div class="date">📅 15 مايو 2026 - الساعة 8 مساءً</div>

      <div class="countdown">
        <div class="box">
          <div class="num" id="days">0</div>
          <div class="label">يوم</div>
        </div>
        <div class="box">
          <div class="num" id="hours">0</div>
          <div class="label">ساعة</div>
        </div>
        <div class="box">
          <div class="num" id="minutes">0</div>
          <div class="label">دقيقة</div>
        </div>
        <div class="box">
          <div class="num" id="seconds">0</div>
          <div class="label">ثانية</div>
        </div>
      </div>
    </div>

    
  </div>

  <script>
    const eventDate = new Date("May 15, 2026 20:00:00").getTime();

    setInterval(() => {
      const now = new Date().getTime();
      const diff = eventDate - now;

      if (diff <= 0) return;

      document.getElementById("days").innerText =
        Math.floor(diff / (1000 * 60 * 60 * 24));

      document.getElementById("hours").innerText =
        Math.floor((diff / (1000 * 60 * 60)) % 24);

      document.getElementById("minutes").innerText =
        Math.floor((diff / (1000 * 60)) % 60);

      document.getElementById("seconds").innerText =
        Math.floor((diff / 1000) % 60);

    }, 1000);
  </script>

</body>
</html>
